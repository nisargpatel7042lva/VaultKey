# Produces target/deploy/vault.so via Docker (same as `pnpm run build:vault:sbf`).
name: Build vault (SBF, Docker)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "programs/vault/**"
      - "Dockerfile.vault-sbf"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Anchor.toml"
      - "rust-toolchain.toml"

jobs:
  vault-so:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vault.so in container
        run: bash scripts/build-vault-sbf.sh

      - uses: actions/upload-artifact@v4
        with:
          name: vault-sbf-${{ github.sha }}
          path: target/deploy/vault.so
          if-no-files-found: error
